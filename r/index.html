<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Anti-cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Redirecting...</title>

</head>

<body>

<script>

  /*
    Dynamic QR Routes
  */

  const routes = {

    home: "https://picorobotics.shop",

  wa: "https://wa.me/8801XXXXXXXXX",
  p1: "https://boundforthe.top/mhshrabon" ,
  p2: "",
  p3: "",
  p4: "",
  p5: "",
  p6: "",
  p7: "",
  p8: "",
  p9: "",
  p10: ""


  };


  /*
    Get URL parameter
  */

  const params = new URLSearchParams(window.location.search);

  const target = params.get("to");


  /*
    Redirect if valid
  */

  if (target && routes[target]) {

    /*
      Use href instead of replace
      Better compatibility with some sites
    */

    window.location.href = routes[target];

  } else {

    /*
      Invalid route page
    */

    document.body.innerHTML = `

      <div style="
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 60px;
      ">

        <h2>Invalid QR Link</h2>

        <p>No destination found.</p>

      </div>

    `;

  }

</script>

</body>

</html>
