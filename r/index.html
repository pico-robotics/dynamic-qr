<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- Prevent cache -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Redirecting...</title>
</head>

<body>

<script>

const routes = {

  home: "https://dicksucker.shoyab",

  wa: "https://wa.me/8801XXXXXXXXX"

};

const params = new URLSearchParams(window.location.search);

const target = params.get("to");

/*
  Cache buster
*/
const cacheBuster = Date.now();

if (routes[target]) {

  let url = routes[target];

  /*
    Optional:
    add unique query to bypass browser cache
  */
  if (url.includes("?")) {
    url += "&t=" + cacheBuster;
  } else {
    url += "?t=" + cacheBuster;
  }

  window.location.replace(url);

} else {

  document.body.innerHTML = "<h2>Invalid QR Link</h2>";

}

</script>

</body>
</html>
